#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: false
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_COMMIT:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_COMMIT: ${{inputs.WRT_COMMIT}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          # 从所有配置文件合并搜索目标设备符号（某些配置不含 CONFIG_TARGET）
          echo "WRT_TARGET=$(cat ./Config/$WRT_CONFIG.txt ./Config/GENERAL.txt 2>/dev/null | grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)')" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          if [ -n "$WRT_COMMIT" ]; then
            echo "Pinning to commit: $WRT_COMMIT"
            git clone --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/
            cd ./wrt/ && git checkout $WRT_COMMIT
          else
            git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/
          fi

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # 如果不存在 defconfig 则直接结束工作流
          if [ ! -d "defconfig" ]; then
            echo "defconfig directory not found, stopping workflow."
            exit 0
          fi

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

          # 删除上游新增的无保护 HNAT 补丁（9999-02 定义 ppd_dev/sent_ppd，
          # 9999-03 引用它们并修改 br_input.c）。未启用 CONFIG_NET_MEDIATEK_HNAT
          # 时，mtkhnat.ko 找不到 ppd_dev 符号导致 modpost 失败。
          # 9999-02 中移除 MTK_SRAM/MTK_HWLRO 的能力标志部分已提取为 9999-02-capability.patch。
          # 9999-01/04/05 为合法修复，保留。
          # 999-2745 已有条件编译保护，保留。
          HNAT_PATCH_DIR="target/linux/mediatek/patches-6.6"
          for PATCH in 9999-02-mtk_enhance.patch 9999-03-fix-ext-hnat-with-fdb-error.patch; do
            if [ -f "$HNAT_PATCH_DIR/$PATCH" ]; then
              rm -f "$HNAT_PATCH_DIR/$PATCH"
              echo "Removed unprotected HNAT patch: $PATCH"
            fi
          done

      - name: Prepare Kernel & Fix Capability
        run: |
          cd ./wrt/
          TERM=dumb make target/linux/prepare V=s -j$(nproc)  # CI headless fix
          TARGET_H="build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.6.94/drivers/net/ethernet/mediatek/mtk_eth_soc.h"
          if [ -f "$TARGET_H" ]; then
            echo "=== Before fix ==="
            grep -n "MT7981_CAPS\|MT7986_CAPS" "$TARGET_H"
            sed -i 's/| MTK_SRAM | MTK_PDMA_INT | MTK_HWLRO)/| MTK_PDMA_INT)/g' "$TARGET_H"
            echo "=== After fix ==="
            grep -n "MT7981_CAPS\|MT7986_CAPS" "$TARGET_H"
          else
            echo "ERROR: mtk_eth_soc.h not found!"
            find build_dir -name "mtk_eth_soc.h" 2>/dev/null
          fi

      - name: Fix Dual-Forward Speed Drop
        run: |
          mkdir -p ./wrt/files/etc/sysctl.d
          cat > ./wrt/files/etc/sysctl.d/99-disable-sw-offload.conf << 'EOF'
          net.netfilter.nf_flowtable_offload=0
          EOF
          cat ./wrt/files/etc/sysctl.d/99-disable-sw-offload.conf

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "toolchain skiped done!"
          else
            echo "caches missed!"
          fi

          if ${{steps.check-cache.outputs.cache-hit != 'true'}}; then
            CACHE_LIST=$(gh cache list --key "$WRT_CONFIG-$WRT_INFO" | cut -f 1)
            for CACHE_KEY in $CACHE_LIST; do
              gh cache delete $CACHE_KEY
            done

            echo "caches cleanup done!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -f -p qmodem

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

          # 复制本地5G看板插件
          cp -rf $GITHUB_WORKSPACE/luci-app-5g-dashboard ./luci-app-5g-dashboard

          # 复制qmi_fix_skb内核模块
          cp -rf $GITHUB_WORKSPACE/package/qmi_fix_skb ./qmi_fix_skb

          #复制luci-app-aiqos AI信号优化套件
          cp -rf $GITHUB_WORKSPACE/luci-app-aiqos ./luci-app-aiqos

      - name: Patch HNAT DTS
        run: |
          echo "=== HNAT DTS: Inject usb0 whitelist + ensure wwan prefix ==="

          find ./wrt/target/linux/mediatek -name "*.dts" -o -name "*.dtsi" | while read dts_file; do
            PATCHED=0

            # Layer 1: Ensure ext-devices = "usb0" in hnat node
            if grep -q "[&]*hnat[[:space:]]*{" "$dts_file" 2>/dev/null; then
              if ! grep -q 'ext-devices.*usb0' "$dts_file" 2>/dev/null; then
                echo "[usb0] Injecting ext-devices = \"usb0\" into $dts_file"
                sed -i '/[&]*hnat[[:space:]]*{/a\\t\text-devices = "usb0";' "$dts_file"
                PATCHED=1
              else
                echo "[usb0] Already present in $dts_file"
              fi
            fi

            # Layer 2: Ensure wwan in ext-devices-prefix
            if grep -q "ext-devices-prefix" "$dts_file" 2>/dev/null; then
              if ! grep "ext-devices-prefix" "$dts_file" | grep -q "wwan"; then
                echo "[wwan] Adding wwan to ext-devices-prefix: $dts_file"
                sed -i 's/ext-devices-prefix = "\\(.*\\)"/ext-devices-prefix = "\\1,wwan"/' "$dts_file"
                PATCHED=1
              else
                echo "[wwan] Already in ext-devices-prefix: $dts_file"
              fi
            fi

            if [ "$PATCHED" -eq 0 ]; then
              echo "No hnat node or prefix found in $dts_file (skip)"
            fi
          done

          echo "=== Verification ==="
          find ./wrt/target/linux/mediatek -name "*.dts" -o -name "*.dtsi" | xargs grep -l "ext-devices" 2>/dev/null | while read f; do
            echo "--- $f ---"
            grep -A5 "hnat" "$f" | head -10
          done

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/BUSYBOX.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig -j$(nproc) || true

          # 检查目标设备符号是否被 defconfig 丢弃（如 Kconfig 自引用递归导致）
          if [ -n "$WRT_TARGET" ] && ! grep -q "CONFIG_TARGET_${WRT_TARGET}=y" .config; then
            echo "WARNING: CONFIG_TARGET_${WRT_TARGET}=y lost after defconfig, re-injecting"
            echo "CONFIG_TARGET_${WRT_TARGET}=y" >> .config
            make defconfig -j$(nproc) || true
          fi

          # 强制启用KPROBES（defconfig可能覆盖）
          sed -i 's/.*CONFIG_KPROBES.*/CONFIG_KPROBES=y/' .config
          grep -q "CONFIG_KPROBES=y" .config || echo "CONFIG_KPROBES=y" >> .config

          #强制启用kmod-qmi-fix-skb（defconfig可能移除）
          grep -q "CONFIG_PACKAGE_kmod-qmi-fix-skb=y" .config || echo "CONFIG_PACKAGE_kmod-qmi-fix-skb=y" >> .config

          # 强制内核重编
          make target/linux/clean -j$(nproc) || true

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
            echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ')" >> $GITHUB_ENV

            find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

            for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*") ; do
              EXT=$(basename $FILE | cut -d '.' -f 2-)
              NAME=$(basename $FILE | cut -d '.' -f 1 | grep -io "\($WRT_TARGET\).*")
              NEW_FILE="$WRT_INFO"-"$WRT_BRANCH"-"$NAME"-"$WRT_DATE"."$EXT"
              mv -f $FILE ./upload/$NEW_FILE
            done

            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |
            这是个平台固件包，内含多个设备！
            请注意选择你需要的设备固件！
            不要问，刷就完事了！

            全系带闭源硬件加速，别问了！

            源码：${{env.WRT_REPO}}
            分支：${{env.WRT_BRANCH}}
            提交：${{env.WRT_HASH}}

            配置：${{env.WRT_CONFIG}}
            平台：${{env.WRT_TARGET}}

            登录地址：${{env.WRT_IP}}
            登录密码：${{env.WRT_PW}}

            WIFI名称：${{env.WRT_SSID}}
            WIFI密码：${{env.WRT_WORD}}

            内核版本：${{env.WRT_KVER}}
            插件列表：${{env.WRT_LIST}}
